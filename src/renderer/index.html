<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Chat</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="global-preferences">
      <label class="preference-select">
        <span data-i18n="language">语言</span>
        <select id="languageSelect" aria-label="Language">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </label>
      <label class="preference-select">
        <span data-i18n="theme">主题</span>
        <select id="themeSelect" aria-label="Theme">
          <option value="light" data-i18n="lightMode">浅色</option>
          <option value="dark" data-i18n="darkMode">深色</option>
        </select>
      </label>
    </div>

    <main class="app-shell">
      <section class="setup-view" id="setupView" hidden>
        <div class="setup-panel">
          <p class="eyebrow">Simple Chat</p>
          <h1 data-i18n="setupTitle">先连接你的模型</h1>
          <p class="setup-copy" data-i18n="setupCopy">只需要设置一次，之后打开就能直接聊天。</p>

          <form id="setupForm" class="setup-form">
            <label>
              <span>API URL</span>
              <input id="apiUrlInput" type="url" placeholder="https://api.openai.com/v1" required>
            </label>
            <label>
              <span>API Key</span>
              <input id="apiKeyInput" type="password" data-i18n-placeholder="apiKeyPlaceholder" placeholder="输入你的 API Key" required>
            </label>
            <label>
              <span data-i18n="modelName">模型名</span>
              <input id="modelInput" type="text" placeholder="gpt-5.4-mini" required>
            </label>
            <button type="submit" class="primary-button" data-i18n="saveAndStart">保存并开始</button>
          </form>
        </div>
      </section>

      <section class="chat-view" id="chatView" hidden>
        <aside class="sidebar">
          <div class="sidebar-top">
            <div class="workspace-switcher" role="tablist" aria-label="Workspace">
              <button id="chatWorkspaceButton" class="workspace-button active" type="button" data-i18n="chatWorkspace">聊天</button>
              <button id="videoWorkspaceButton" class="workspace-button" type="button" data-i18n="videoWorkspace">视频制作</button>
            </div>
            <button id="newChatButton" class="ghost-button" type="button" data-i18n="newChat">新聊天</button>
          </div>
          <p class="sidebar-label">Chats</p>
          <div class="chat-list" id="chatList"></div>
          <div class="sidebar-bottom-actions">
            <button id="settingsButton" class="ghost-button" type="button" data-i18n="apiSettings">API 设置</button>
            <button id="videoSettingsButton" class="ghost-button" type="button" data-i18n="videoApiSettings">Video API</button>
          </div>
        </aside>

        <section class="conversation" id="conversationWorkspace">
          <header class="chat-header">
            <div>
              <p id="conversationTitle" class="conversation-title">新聊天</p>
            </div>
          </header>

          <div id="messageList" class="message-list"></div>

          <div class="composer-wrap">
            <form id="chatForm" class="composer">
              <div id="attachmentTray" class="attachment-tray" hidden></div>
              <textarea id="messageInput" rows="2" data-i18n-placeholder="messagePlaceholder" placeholder="想聊什么？"></textarea>
              <input id="imageInput" type="file" accept="image/*" multiple hidden>
              <div class="composer-footer">
                <div class="composer-left">
                  <button id="imageButton" type="button" class="attach-button" data-i18n="addImage" data-i18n-title="addImage" title="添加图片">添加图片</button>
                  <label class="search-toggle">
                    <input id="webSearchToggle" type="checkbox">
                    <span data-i18n="webSearch">联网</span>
                  </label>
                </div>
                <div class="composer-right">
                  <div class="reasoning-control" role="radiogroup" aria-label="回复模式">
                    <button type="button" class="mode-button active" data-mode="快速" data-i18n="fast">快速</button>
                    <button type="button" class="mode-button" data-mode="均衡" data-i18n="balanced">均衡</button>
                    <button type="button" class="mode-button" data-mode="深度" data-i18n="deep">深度</button>
                  </div>
                  <button type="submit" class="send-button" aria-label="发送">↑</button>
                </div>
              </div>
            </form>
            <div class="model-strip">
              <span data-i18n="currentModel">当前模式</span>
              <strong id="modelName">模型</strong>
            </div>
          </div>
          <p id="statusText" class="status-text"></p>
        </section>

        <section class="video-workspace" id="videoWorkspace" hidden>
          <header class="video-header">
            <div>
              <p class="conversation-title" data-i18n="videoWorkspace">视频制作</p>
              <p class="video-subtitle" data-i18n="videoSubtitle">输入文字，也可以加一张图片来生成视频。</p>
            </div>
          </header>

          <div class="video-layout">
            <form id="videoForm" class="video-form">
              <label class="video-prompt-label">
                <span data-i18n="videoPrompt">视频描述</span>
                <textarea id="videoPromptInput" rows="6" data-i18n-placeholder="videoPromptPlaceholder" placeholder="描述你想生成的视频"></textarea>
              </label>

              <div id="videoImageDropzone" class="video-dropzone" role="button" tabindex="0">
                <input id="videoImageInput" type="file" accept="image/*" hidden>
                <div id="videoImageEmpty" class="video-dropzone-empty">
                  <strong data-i18n="addReferenceImage">添加图片</strong>
                  <span data-i18n="imageOptional">可选：拖拽图片到这里，或点击选择。</span>
                </div>
                <div id="videoImagePreview" class="video-image-preview" hidden>
                  <img id="videoImageThumb" alt="Reference image">
                  <button id="removeVideoImageButton" class="remove-attachment" type="button" data-i18n-title="removeImage" title="Remove image">x</button>
                </div>
              </div>

              <div class="video-option-group">
                <span class="option-label" data-i18n="aspectRatio">画面比例</span>
                <div class="segmented-options" id="aspectRatioOptions">
                  <button type="button" class="segment-button active" data-value="9:16" data-i18n="portrait">竖屏 9:16</button>
                  <button type="button" class="segment-button" data-value="16:9" data-i18n="landscape">横屏 16:9</button>
                  <button type="button" class="segment-button" data-value="1:1" data-i18n="square">方形 1:1</button>
                </div>
              </div>

              <details class="advanced-video-options">
                <summary data-i18n="advancedOptions">更多选项</summary>
                <div class="advanced-grid">
                  <label>
                    <span data-i18n="duration">时长</span>
                    <select id="videoDurationSelect">
                      <option value="5" data-i18n="fiveSeconds">5 秒</option>
                      <option value="10" data-i18n="tenSeconds">10 秒</option>
                    </select>
                  </label>
                  <label>
                    <span data-i18n="quality">清晰度</span>
                    <select id="videoQualitySelect">
                      <option value="standard" data-i18n="standardQuality">标准</option>
                      <option value="high" data-i18n="highQuality">高清</option>
                    </select>
                  </label>
                  <label>
                    <span data-i18n="videoModelName">视频模型名</span>
                    <input id="videoModelOverrideInput" type="text" data-i18n-placeholder="useSavedVideoModel" placeholder="使用已保存的视频模型">
                  </label>
                </div>
              </details>

              <button id="generateVideoButton" type="submit" class="primary-button" data-i18n="generateVideo">生成视频</button>
              <p id="videoStatusText" class="status-text"></p>
            </form>

            <aside class="video-side-panel">
              <section id="videoResultPanel" class="video-result-panel" hidden>
                <p class="sidebar-label" data-i18n="latestVideo">最新视频</p>
                <video id="videoPlayer" class="video-player" controls></video>
                <div class="video-actions">
                  <a id="downloadVideoLink" class="ghost-button" download target="_blank" rel="noreferrer" data-i18n="downloadVideo">下载</a>
                  <button id="copyVideoLinkButton" class="ghost-button" type="button" data-i18n="copyVideoLink">复制链接</button>
                </div>
              </section>

              <section class="video-history-section">
                <p class="sidebar-label" data-i18n="videoHistory">视频历史</p>
                <div id="videoHistoryList" class="video-history-list"></div>
              </section>
            </aside>
          </div>
        </section>
      </section>
    </main>

    <div id="settingsModal" class="modal" hidden>
      <form id="settingsForm" class="modal-panel">
        <div class="modal-header">
          <h2 data-i18n="settings">设置</h2>
          <button id="closeSettingsButton" class="icon-button" type="button">×</button>
        </div>
        <label>
          <span>API URL</span>
          <input id="settingsApiUrl" type="url" required>
        </label>
        <label>
          <span>API Key</span>
          <input id="settingsApiKey" type="password" required>
        </label>
        <label>
          <span data-i18n="modelName">模型名</span>
          <input id="settingsModel" type="text" required>
        </label>
        <button type="submit" class="primary-button" data-i18n="saveSettings">保存设置</button>
      </form>
    </div>

    <div id="videoSettingsModal" class="modal" hidden>
      <form id="videoSettingsForm" class="modal-panel">
        <div class="modal-header">
          <h2 data-i18n="videoApiSettings">Video API 设置</h2>
          <button id="closeVideoSettingsButton" class="icon-button" type="button">x</button>
        </div>
        <label>
          <span>Video API URL</span>
          <input id="videoSettingsApiUrl" type="url" placeholder="https://video-api.example.com/v1" required>
        </label>
        <label>
          <span>Video API Key</span>
          <input id="videoSettingsApiKey" type="password" required>
        </label>
        <label>
          <span data-i18n="videoModelName">视频模型名</span>
          <input id="videoSettingsModel" type="text" required>
        </label>
        <button type="submit" class="primary-button" data-i18n="saveSettings">保存设置</button>
      </form>
    </div>

    <div id="renameModal" class="modal" hidden>
      <form id="renameForm" class="modal-panel rename-panel">
        <div class="modal-header">
          <h2 data-i18n="renameChat">重命名对话</h2>
          <button id="closeRenameButton" class="icon-button" type="button">×</button>
        </div>
        <label>
          <span data-i18n="chatName">对话名称</span>
          <input id="renameInput" type="text" autocomplete="off" required>
        </label>
        <div class="rename-actions">
          <button type="button" id="cancelRenameButton" class="ghost-button" data-i18n="cancel">取消</button>
          <button type="submit" class="primary-button" data-i18n="saveName">保存名称</button>
        </div>
      </form>
    </div>

    <div id="imagePreviewModal" class="modal image-preview-modal" hidden>
      <div class="image-preview-panel" role="dialog" aria-modal="true" aria-labelledby="imagePreviewTitle">
        <div class="modal-header image-preview-header">
          <h2 id="imagePreviewTitle" data-i18n="imagePreview">Preview image</h2>
          <button id="closeImagePreviewButton" class="icon-button" type="button" data-i18n-title="closePreview" title="Close">x</button>
        </div>
        <img id="imagePreviewImage" class="image-preview-image" alt="Preview image">
      </div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
